name: Build prueba
on:
  fork
  
env: 
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: 'Release'
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Mensaje Inicial
          run: echo "Iniciando workflow de CI"
        - name: Checkout del código
          uses: actions/checkout@v4
        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: ${{env.DOTNET_VERSION}}
        
        - name: Restore Dependencies
          run: dotnet restore src/Api/Api.csproj --verbosity ${{inputs.log_level || 'normal'}} 
          
        - name: Build del proyecto
          run: |
            CONFIG=${{inputs.build_configuration || 'Release'}}
            echo "Building with configuration: $CONFIG"
            dotnet build src/Api/Api.csproj --configuration $CONFIG --no-restore